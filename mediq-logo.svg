<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b8eff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0ef0c4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ef0c4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff5e7e;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="128" cy="128" r="128" fill="url(#grad1)" opacity="0.15"/>
  
  <!-- Outer ring -->
  <circle cx="128" cy="128" r="110" fill="none" stroke="url(#grad1)" stroke-width="2"/>
  
  <!-- Inner circle background -->
  <circle cx="128" cy="128" r="95" fill="#ffffff" opacity="0.98"/>
  
  <!-- Magnifying glass body -->
  <circle cx="90" cy="85" r="38" fill="none" stroke="url(#grad1)" stroke-width="6"/>
  
  <!-- Magnifying glass handle -->
  <line x1="120" y1="115" x2="160" y2="155" stroke="url(#grad2)" stroke-width="6" stroke-linecap="round"/>
  
  <!-- DNA helix in the search circle -->
  <!-- Left strand -->
  <path d="M 75 85 Q 85 75, 95 85 T 115 85" fill="none" stroke="url(#grad2)" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Right strand -->
  <path d="M 85 95 Q 95 105, 105 95 T 125 95" fill="none" stroke="url(#grad1)" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Connecting dots (rungs) -->
  <circle cx="87" cy="87" r="2" fill="url(#grad1)"/>
  <circle cx="97" cy="87" r="2" fill="url(#grad1)"/>
  <circle cx="107" cy="87" r="2" fill="url(#grad1)"/>
  <circle cx="93" cy="97" r="2" fill="url(#grad2)"/>
  <circle cx="103" cy="97" r="2" fill="url(#grad2)"/>
  <circle cx="113" cy="97" r="2" fill="url(#grad2)"/>
  
  <!-- Pulse wave indicator (medical) -->
  <path d="M 55 128 L 65 128 L 70 123 L 75 133 L 80 128 L 85 128" fill="none" stroke="url(#grad1)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Medical cross accent -->
  <g opacity="0.8">
    <rect x="200" y="110" width="8" height="36" fill="url(#grad1)" rx="2"/>
    <rect x="184" y="126" width="36" height="8" fill="url(#grad1)" rx="2"/>
  </g>
  
  <!-- Outer accent circles -->
  <circle cx="128" cy="128" r="125" fill="none" stroke="url(#grad2)" stroke-width="1" opacity="0.4"/>
  <circle cx="128" cy="128" r="105" fill="none" stroke="url(#grad1)" stroke-width="1" opacity="0.4"/>
  
  <!-- Small decorative elements -->
  <circle cx="35" cy="50" r="3" fill="url(#grad1)" opacity="0.6"/>
  <circle cx="210" cy="200" r="2.5" fill="url(#grad2)" opacity="0.6"/>
  <circle cx="220" cy="50" r="2" fill="url(#grad1)" opacity="0.5"/>
</svg>